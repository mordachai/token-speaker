name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'module.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version-changed: ${{ steps.check-version.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version
        id: get-version
        run: |
          VERSION=$(jq -r '.version' module.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Check if version changed
        id: check-version
        run: |
          git diff HEAD^ HEAD -- module.json > diff.txt
          if grep -q '"version"' diff.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get module info
        id: module-info
        run: |
          VERSION=$(jq -r '.version' module.json)
          TITLE=$(jq -r '.title' module.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Update module.json URLs for this release
        run: |
          VERSION=${{ steps.module-info.outputs.version }}
          REPO=${{ github.repository }}
          jq \
            --arg manifest "https://github.com/${REPO}/releases/download/v${VERSION}/module.json" \
            --arg download "https://github.com/${REPO}/releases/download/v${VERSION}/module.zip" \
            '.manifest = $manifest | .download = $download' \
            module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            assets/ \        
            scripts/ \
            styles/ \
            templates/ \
            LICENSE
          ls -lh module.zip
          unzip -l module.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.module-info.outputs.version }}
          name: ${{ steps.module-info.outputs.title }} v${{ steps.module-info.outputs.version }}
          body: |
            ## ${{ steps.module-info.outputs.title }} v${{ steps.module-info.outputs.version }}

            ### Installation
            Install using this manifest URL in Foundry VTT:
            ```
            https://github.com/${{ github.repository }}/releases/download/v${{ steps.module-info.outputs.version }}/module.json
            ```
            Or download `module.zip` and install manually.

            ### Compatibility
            - Foundry VTT v14+
          files: |
            module.zip
            module.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
